<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code_Along Quiz</title>
    <link rel="Stylesheet" href="styles/quiz.css">
</head>

<body>
    <main>
        <h1>HTML & CSS QUIZ</h1>
        <form>
            <label for="question1">Question One</label>
            <input type="text" name="q1" id="q1">
            <label for="question2">Question Two</label>
            <input type="textarea" name="q2" id="q2">
            <label for="question3">Question Three</label>
            <select name="q3" id="q3">
                <option value="" selected disabled>Choose one option</option>
                <option value="abcd">abcd</option>
                <option value="efgh">efgh</option>
                <option value="ijkl">ijkl</option>
                <option value="mnop">mnop</option>
            </select>
            <label for="question4">Question Four</label>
            <input type="number" name="q4" id="q4">
            <button type="submit">Submit</button>
        </form>
    </main>
</body>
